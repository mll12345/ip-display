<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你已急哭</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #0a0a1a;
            --alien-skin: #70f0c0;
            --energy-core: #ffd700;
            --nebula: #1a2a4a;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('bg.jpg') center center / 120% 120% no-repeat fixed;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(112, 240, 192, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 80px 100px;
            box-shadow: 
                0 0 60px rgba(112, 240, 192, 0.4),
                0 0 120px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(112, 240, 192, 0.4);
            text-align: center;
            max-width: 90vw;
            width: 90%;
            border: 3px solid rgba(112, 240, 192, 0.5);
            position: relative;
            z-index: 2;
            animation: containerGlow 3s ease-in-out infinite alternate;
        }

        @keyframes containerGlow {
            0% {
                box-shadow: 
                    0 0 40px rgba(112, 240, 192, 0.3),
                    0 0 80px rgba(255, 215, 0, 0.2),
                    inset 0 1px 0 rgba(112, 240, 192, 0.3);
            }
            100% {
                box-shadow: 
                    0 0 50px rgba(112, 240, 192, 0.4),
                    0 0 100px rgba(255, 215, 0, 0.3),
                    inset 0 1px 0 rgba(112, 240, 192, 0.4);
            }
        }

        .icon {
            width: 150px;
            height: 150px;
            margin: 0 auto 50px;
            background: radial-gradient(circle, rgba(112, 240, 192, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(112, 240, 192, 0.6);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 50px rgba(112, 240, 192, 0.6);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 70px rgba(255, 215, 0, 0.8);
            }
        }

        .icon svg {
            width: 85px;
            height: 85px;
            fill: var(--alien-skin);
            filter: drop-shadow(0 0 15px rgba(112, 240, 192, 1));
        }

        h1 {
            color: var(--text);
            font-size: 72px;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-shadow: 
                0 0 30px rgba(255, 215, 0, 1),
                0 0 60px rgba(112, 240, 192, 0.8),
                3px 3px 6px rgba(0, 0, 0, 0.9);
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.4);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 20px rgba(255, 215, 0, 0.8),
                    0 0 40px rgba(112, 240, 192, 0.6),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            100% {
                text-shadow: 
                    0 0 30px rgba(255, 215, 0, 1),
                    0 0 60px rgba(112, 240, 192, 0.8),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
        }

        .ip-display {
            background: rgba(26, 42, 74, 0.6);
            border-radius: 20px;
            padding: 40px 50px;
            margin: 50px 0;
            transition: all 0.3s ease;
            border: 3px solid rgba(112, 240, 192, 0.6);
            box-shadow: 
                0 0 30px rgba(112, 240, 192, 0.4),
                inset 0 0 30px rgba(0, 0, 0, 0.4);
        }

        .ip-display:hover {
            background: rgba(26, 42, 74, 0.8);
            transform: translateY(-5px);
            box-shadow: 
                0 0 50px rgba(112, 240, 192, 0.6),
                0 0 100px rgba(255, 215, 0, 0.4),
                inset 0 0 30px rgba(0, 0, 0, 0.4);
            border-color: var(--alien-skin);
        }

        .ip-value {
            font-size: 72px;
            font-weight: 700;
            color: var(--alien-skin);
            letter-spacing: 4px;
            text-shadow: 
                0 0 30px rgba(112, 240, 192, 1),
                0 0 60px rgba(112, 240, 192, 0.6);
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .ip-loading {
            font-size: 20px;
            color: var(--text);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            margin-top: 40px;
            line-height: 2;
        }

        .info strong {
            color: var(--alien-skin);
            font-weight: 600;
            text-shadow: 0 0 15px rgba(112, 240, 192, 0.8);
        }

        .refresh-btn {
            margin-top: 40px;
            padding: 20px 60px;
            background: linear-gradient(135deg, rgba(112, 240, 192, 0.2), rgba(255, 215, 0, 0.2));
            border: 3px solid var(--alien-skin);
            border-radius: 16px;
            color: var(--text);
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(112, 240, 192, 0.4);
        }

        .refresh-btn:hover {
            background: linear-gradient(135deg, rgba(112, 240, 192, 0.4), rgba(255, 215, 0, 0.4));
            transform: translateY(-5px);
            box-shadow: 
                0 0 50px rgba(112, 240, 192, 0.8),
                0 0 100px rgba(255, 215, 0, 0.6);
            text-shadow: 0 0 15px rgba(255, 255, 255, 1);
        }

        .refresh-btn:active {
            transform: translateY(-2px);
        }

        .error {
            color: rgba(255, 100, 100, 0.95);
            font-size: 16px;
            margin-top: 16px;
            text-shadow: 0 0 10px rgba(255, 100, 100, 0.6);
        }

        @media (max-width: 1024px) {
            .container {
                padding: 60px 80px;
            }

            h1 {
                font-size: 56px;
            }

            .ip-value {
                font-size: 56px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 50px 40px;
                border-radius: 24px;
            }

            .icon {
                width: 100px;
                height: 100px;
                margin-bottom: 40px;
            }

            .icon svg {
                width: 60px;
                height: 60px;
            }

            h1 {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .ip-display {
                padding: 30px 40px;
                margin: 40px 0;
            }

            .ip-value {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .info {
                font-size: 16px;
            }

            .refresh-btn {
                padding: 16px 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>
        
        <h1>你已急哭</h1>
        
        <div class="ip-display">
            <div class="ip-value" id="ipValue">
                <span class="ip-loading">正在获取...</span>
            </div>
        </div>
        
        <p class="info">
            <strong>提示：</strong>这是您当前的公网IP地址，可用于识别您的网络位置。<br>
            刷新页面可重新获取IP信息。
        </p>
        
        <button class="refresh-btn" onclick="fetchIP()">刷新</button>
    </div>

    <script>
        async function fetchIP() {
            const ipValue = document.getElementById('ipValue');
            ipValue.innerHTML = '<span class="ip-loading">正在获取...</span>';
            
            try {
                // 从本地服务器API获取IP
                const response = await fetch('/api/ip', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`服务器返回错误: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success && data.ip) {
                    ipValue.innerHTML = data.ip;
                    ipValue.style.color = '#ffffff';
                } else {
                    throw new Error('无法获取IP地址');
                }
            } catch (error) {
                console.error('获取IP失败:', error);
                ipValue.innerHTML = '获取失败';
                ipValue.style.color = 'rgba(255, 200, 200, 0.95)';
            }
        }

        // 页面加载时自动获取IP
        window.addEventListener('DOMContentLoaded', fetchIP);
    </script>
</body>
</html>
