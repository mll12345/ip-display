<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你已急哭</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #0a0a1a;
            --alien-skin: #70f0c0;
            --energy-core: #ffd700;
            --nebula: #1a2a4a;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('bg.jpg') center center / cover no-repeat fixed;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(112, 240, 192, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 64px;
            box-shadow: 
                0 0 40px rgba(112, 240, 192, 0.3),
                0 0 80px rgba(255, 215, 0, 0.2),
                inset 0 1px 0 rgba(112, 240, 192, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 2px solid rgba(112, 240, 192, 0.4);
            position: relative;
            z-index: 2;
            animation: containerGlow 3s ease-in-out infinite alternate;
        }

        @keyframes containerGlow {
            0% {
                box-shadow: 
                    0 0 40px rgba(112, 240, 192, 0.3),
                    0 0 80px rgba(255, 215, 0, 0.2),
                    inset 0 1px 0 rgba(112, 240, 192, 0.3);
            }
            100% {
                box-shadow: 
                    0 0 50px rgba(112, 240, 192, 0.4),
                    0 0 100px rgba(255, 215, 0, 0.3),
                    inset 0 1px 0 rgba(112, 240, 192, 0.4);
            }
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 32px;
            background: radial-gradient(circle, rgba(112, 240, 192, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(112, 240, 192, 0.5);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(112, 240, 192, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            }
        }

        .icon svg {
            width: 50px;
            height: 50px;
            fill: var(--alien-skin);
            filter: drop-shadow(0 0 10px rgba(112, 240, 192, 0.8));
        }

        h1 {
            color: var(--text);
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(112, 240, 192, 0.6),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 20px rgba(255, 215, 0, 0.8),
                    0 0 40px rgba(112, 240, 192, 0.6),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            100% {
                text-shadow: 
                    0 0 30px rgba(255, 215, 0, 1),
                    0 0 60px rgba(112, 240, 192, 0.8),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
        }

        .ip-display {
            background: rgba(26, 42, 74, 0.6);
            border-radius: 16px;
            padding: 32px 48px;
            margin: 32px 0;
            transition: all 0.3s ease;
            border: 2px solid rgba(112, 240, 192, 0.5);
            box-shadow: 
                0 0 20px rgba(112, 240, 192, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .ip-display:hover {
            background: rgba(26, 42, 74, 0.8);
            transform: translateY(-3px);
            box-shadow: 
                0 0 30px rgba(112, 240, 192, 0.5),
                0 0 60px rgba(255, 215, 0, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            border-color: var(--alien-skin);
        }

        .ip-value {
            font-size: 48px;
            font-weight: 700;
            color: var(--alien-skin);
            letter-spacing: 1px;
            text-shadow: 
                0 0 20px rgba(112, 240, 192, 0.8),
                0 0 40px rgba(112, 240, 192, 0.4);
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            margin-bottom: 12px;
            display: none;
        }

        .location-info {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .location-item {
            margin: 4px 0;
        }

        .map-container {
            margin: 32px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(112, 240, 192, 0.4);
            box-shadow: 0 0 20px rgba(112, 240, 192, 0.3);
            display: none;
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .ip-loading {
            font-size: 20px;
            color: var(--text);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .refresh-btn {
            margin-top: 24px;
            padding: 12px 32px;
            background: linear-gradient(135deg, rgba(112, 240, 192, 0.2), rgba(255, 215, 0, 0.2));
            border: 2px solid var(--alien-skin);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 0 20px rgba(112, 240, 192, 0.3);
        }

        .refresh-btn:hover {
            background: linear-gradient(135deg, rgba(112, 240, 192, 0.4), rgba(255, 215, 0, 0.4));
            transform: translateY(-2px);
            box-shadow: 
                0 0 30px rgba(112, 240, 192, 0.6),
                0 0 60px rgba(255, 215, 0, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .error {
            color: rgba(255, 100, 100, 0.95);
            font-size: 16px;
            margin-top: 16px;
            text-shadow: 0 0 10px rgba(255, 100, 100, 0.6);
        }

        @media (max-width: 640px) {
            .container {
                padding: 36px 28px;
            }

            .ip-value {
                font-size: 32px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>
        
        <h1>你已急哭</h1>
        
        <div class="map-container" id="mapContainer">
            <img id="mapImage" class="map-image" alt="位置地图">
        </div>
        
        <div class="ip-display">
            <div class="ip-value" id="ipValue"></div>
            <div class="location-info" id="locationInfo">
                <span class="ip-loading">正在获取位置信息...</span>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="fetchIP()">刷新</button>
    </div>

    <script>
        const AMAP_KEY = "653daeebf8f323e0b35bb6e00f85f6f9";
        const TEST_IP = "36.161.32.119"; // 测试IP
        
        async function fetchIP() {
            const ipValue = document.getElementById('ipValue');
            const locationInfo = document.getElementById('locationInfo');
            const mapContainer = document.getElementById('mapContainer');
            const mapImage = document.getElementById('mapImage');
            
            ipValue.innerHTML = '';
            locationInfo.innerHTML = '<span class="ip-loading">正在获取位置信息...</span>';
            mapContainer.style.display = 'none';
            
            try {
                // 从本地服务器API获取IP
                const response = await fetch('/api/ip', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`服务器返回错误: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    // 如果是本地IP，使用测试IP获取地图信息
                    const ipForMap = (data.ip === '127.0.0.1' || data.ip === '::1') ? TEST_IP : data.ip;
                    
                    // 显示地理位置信息（高德地图API格式）
                    if (data.location && data.location.status === '1') {
                        const loc = data.location;
                        let locationHtml = '<div class="location-item">';
                        
                        // 组合显示位置信息
                        const parts = [];
                        if (loc.province) parts.push(loc.province);
                        if (loc.city) parts.push(loc.city);
                        
                        locationHtml += parts.join(' | ');
                        locationHtml += '</div>';
                        
                        // 显示rectangle经纬度范围
                        if (loc.rectangle) {
                            locationHtml += '<div class="location-item" style="font-size: 14px; color: rgba(112, 240, 192, 0.8);">';
                            locationHtml += `区域范围: ${loc.rectangle}`;
                            locationHtml += '</div>';
                            
                            // 加载地图
                            loadMap(loc.rectangle, loc.city);
                        }
                        
                        locationInfo.innerHTML = locationHtml;
                    } else {
                        // 如果无法获取位置信息，显示IP地址
                        locationInfo.innerHTML = `<div class="location-item">${data.ip}</div>`;
                    }
                } else {
                    throw new Error('无法获取IP地址');
                }
            } catch (error) {
                console.error('获取IP失败:', error);
                locationInfo.innerHTML = '获取失败';
                locationInfo.style.color = 'rgba(255, 200, 200, 0.95)';
            }
        }

        function loadMap(rectangle, cityName) {
            const mapContainer = document.getElementById('mapContainer');
            const mapImage = document.getElementById('mapImage');
            
            try {
                // 解析rectangle：最小经度,最小纬度;最大经度,最大纬度
                const [minPart, maxPart] = rectangle.split(';');
                const [minLng, minLat] = minPart.split(',').map(Number);
                const [maxLng, maxLat] = maxPart.split(',').map(Number);
                
                // 计算中心点
                const centerLng = (minLng + maxLng) / 2;
                const centerLat = (minLat + maxLat) / 2;
                
                // 计算zoom级别（基于矩形大小）
                const lngDiff = maxLng - minLng;
                const latDiff = maxLat - minLat;
                const maxDiff = Math.max(lngDiff, latDiff);
                let zoom = 10;
                
                if (maxDiff > 2) zoom = 6;
                else if (maxDiff > 1) zoom = 7;
                else if (maxDiff > 0.5) zoom = 8;
                else if (maxDiff > 0.2) zoom = 9;
                else if (maxDiff > 0.1) zoom = 10;
                else if (maxDiff > 0.05) zoom = 11;
                else if (maxDiff > 0.02) zoom = 12;
                else if (maxDiff > 0.01) zoom = 13;
                else zoom = 14;
                
                // 构建矩形路径（4个点）
                const path = `${minLng},${minLat};${maxLng},${minLat};${maxLng},${maxLat};${minLng},${maxLat};${minLng},${minLat}`;
                
                // 构建静态地图URL
                const mapUrl = `https://restapi.amap.com/v3/staticmap?` +
                    `location=${centerLng},${centerLat}&` +
                    `zoom=${zoom}&` +
                    `size=600*400&` +
                    `paths=2,0xff0000,1,0xff0000,0.3:${path}&` +
                    `key=${AMAP_KEY}`;
                
                console.log('地图URL:', mapUrl);
                mapImage.src = mapUrl;
                mapContainer.style.display = 'block';
                
                // 加载失败处理
                mapImage.onerror = function() {
                    console.error('地图加载失败');
                    mapContainer.style.display = 'none';
                };
                
                // 加载成功
                mapImage.onload = function() {
                    console.log('地图加载成功');
                };
                
            } catch (error) {
                console.error('加载地图失败:', error);
                mapContainer.style.display = 'none';
            }
        }

        // 页面加载时自动获取IP
        window.addEventListener('DOMContentLoaded', fetchIP);
    </script>
</body>
</html>
